<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Plottrbottr RU — локальный SVG-генератор</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header>
    <div>
      <h1>Plottrbottr RU</h1>
    </div>
    <div class="headerActions">
      <label class="themeToggle"><input id="darkTheme" type="checkbox"> Тёмная тема</label>
      <button id="downloadSvg" disabled>Скачать SVG</button>
    </div>
  </header>

  <main>
    <section class="panel controls">
      <h2>Настройки</h2>
      <label class="file">SVG-файл<input id="file" type="file" accept=".svg,image/svg+xml" /></label>
      <div class="grid">
        <label class="check wide"><input id="autoParams" type="checkbox" checked> Автоподбор параметров</label>
        <label>Количество ячеек<input id="numExtraPoints" type="number" step="1" value="120"></label>
        <label>Отступ от контура SVG-файла<input id="safeBorder" type="number" step="0.1" value="0.5"></label>
        <label id="outlineSizeLabel">Размер фигуры<input id="outlineSize" type="number" step="1" min="1" value="2"></label>
        <label>Тип заполнения
          <select id="fillMode">
            <option value="grid" selected>Сетка фигур</option>
            <option value="contours">Замкнутые линии</option>
          </select>
        </label>
        <label>Фигура сетки
          <select id="patternShape">
            <option value="triangle" selected>Треугольник</option>
            <option value="square">Квадрат</option>
            <option value="pentagon">Пятиугольник</option>
            <option value="hexagon">Шестиугольник</option>
          </select>
        </label>
        <label>Режим краёв
          <select id="edgeMode">
            <option value="shrink" selected>Уменьшать у контура</option>
            <option value="clip">Обрезать без уменьшения</option>
          </select>
        </label>
        <label id="hideGridLabel" class="check wide"><input id="hideGrid" type="checkbox"> Скрыть заполнение</label>
      </div>
      <button id="generate">Построить</button>
      <p id="status">Загрузите SVG — предпросмотр будет обновляться автоматически.</p>
    </section>

    <section class="panel preview">
      <div class="previewHead">
        <h2>Предпросмотр</h2>
        <label class="zoom">Масштаб изображения
          <div class="zoomControls">
            <input id="previewScale" type="range" min="1" max="400" step="1" value="100">
            <input id="previewScaleNumber" class="zoomNumber" type="text" inputmode="numeric" pattern="[0-9]*%?" value="100%" aria-label="Процент масштаба">
          </div>
        </label>
      </div>
      <div id="canvas" class="canvas"><div id="previewInner" class="previewInner"></div></div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
